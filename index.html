<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Tree RPG - Path of Cultivation</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container">
        <!-- HOME SCREEN -->
        <div class="screen home-screen active">
            <h1 class="title">Divine Tree RPG</h1>
            <p class="subtitle">Path of Cultivation</p>
            <button class="btn" onclick="goToCharacterSelect()">ENTRAR</button>
        </div>

        <!-- CHARACTER SELECTION SCREEN -->
        <div class="screen character-screen">
            <div style="width: 100%; text-align: center;">
                <h2 class="character-title">Elige tu Cultivador</h2>
                <p class="character-subtitle">Cada uno posee poderes únicos</p>
            </div>

            <div class="character-carousel">
                <button class="carousel-btn" onclick="prevCharacter()" id="prevBtn">←</button>
                <div class="character-card" id="characterCard"></div>
                <button class="carousel-btn" onclick="nextCharacter()" id="nextBtn">→</button>
            </div>

            <div style="width: 100%; text-align: center;">
                <p class="counter" id="counter"></p>
                <button class="btn" onclick="goToDetails()">VER DETALLES</button>
            </div>
        </div>

        <!-- CHARACTER DETAILS SCREEN -->
        <div class="screen details-screen">
            <div class="details-card">
                <div class="details-image-container">
                    <div class="details-image" id="detailsImage"></div>
                </div>
                <h2 class="details-name" id="detailsName"></h2>
                <p class="details-subtitle" id="detailsSubtitle"></p>

                <div class="base-form">Inicio (forma base)</div>

                <div class="stats-container" id="statsContainer"></div>

                <div class="buttons-group">
                    <button class="btn btn-secondary" onclick="goToCharacterSelect()">← ATRÁS</button>
                    <button class="btn btn-tertiary" onclick="startCultivation()">USAR →</button>
                </div>
            </div>
        </div>

        <!-- CULTIVATION SCREEN -->
        <div class="screen cultivation-screen">
            <div class="progress-container">
                <div class="cultivation-bar">
                    <div class="cultivation-fill" id="cultivationFill"></div>
                </div>
                <div class="progress-text" id="progressText">0%</div>
            </div>
            <p class="cultivation-quote" id="quote">La paciencia es la virtud del cultivo.</p>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
